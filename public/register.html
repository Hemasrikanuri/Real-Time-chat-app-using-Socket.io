<!DOCTYPE html>
<html>
<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 shadow rounded w-80">
  <h2 class="text-xl mb-4 text-center">Register</h2>

  <input id="username" placeholder="Username" class="border p-2 w-full mb-2">
  <input id="email" placeholder="Email" class="border p-2 w-full mb-2">
  <input id="password" type="password" class="border p-2 w-full mb-2">

  <button onclick="register()" class="bg-green-500 text-white w-full p-2">Register</button>
</div>

<script>
async function register(){
  const res = await fetch("/auth/register",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();
  alert(data.message);

  window.location="index.html";
}
</script>

</body>
</html>

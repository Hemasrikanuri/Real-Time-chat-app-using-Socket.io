<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 shadow rounded w-80">
  <h2 class="text-xl mb-4 text-center">Login</h2>

  <input id="email" placeholder="Email" class="border p-2 w-full mb-2">
  <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-2">

  <button onclick="login()" class="bg-blue-500 text-white w-full p-2">Login</button>

  <p class="text-center mt-2">
    <a href="register.html" class="text-blue-500">Register</a>
  </p>
</div>

<script>
async function login(){
  const res = await fetch("/auth/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("username", data.user.username);
    window.location="chat.html";
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>

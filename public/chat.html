<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen">

<!-- USERS -->
<div class="w-1/3 bg-gray-200">
  <div class="p-4 bg-green-500 text-white flex justify-between">
    <span>Users</span>
    <button onclick="logout()" class="bg-red-500 px-2 rounded">Logout</button>
  </div>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="flex-1 flex flex-col">

  <div id="chatHeader" class="p-4 bg-green-500 text-white">
    Select user
  </div>

  <ul id="messages" class="flex-1 overflow-y-auto p-3"></ul>

  <div class="flex p-3 border-t">
    <input id="msg" class="flex-1 border p-2">
    <button onclick="send()" class="bg-green-500 text-white px-4 ml-2">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
